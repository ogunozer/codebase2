<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vimeo Title → Gün/Video Mapper</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body { margin: 0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 10px 12px; border-bottom: 1px solid #ddd; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    header button { padding: 8px 10px; cursor:pointer; }
    header .small { font-size: 12px; opacity: .75; }
    main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
    .pane { display:flex; flex-direction:column; gap:8px; }
    textarea { width:100%; flex:1; resize:none; padding:10px; border:1px solid #ccc; border-radius:8px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.35; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .row input { width: 90px; padding:6px 8px; }
    .status { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
    .pill { padding:2px 8px; border:1px solid #ddd; border-radius:999px; }
    .ok { border-color:#9dd; background:#eef; }
    .bad { border-color:#fbb; background:#fee; }
  </style>
</head>
<body>
<header>
  <button id="btnParse">Parse</button>
  <button id="btnStart">Start</button>
  <button id="btnStop" disabled>Stop</button>
  <button id="btnCopy">Copy Output</button>
  <button id="btnClear">Clear Output</button>

  <div class="row">
    <span class="small">Delay (ms):</span>
    <input id="delayMs" type="number" min="0" step="50" value="250" />
    <span class="small">Retries:</span>
    <input id="retries" type="number" min="0" step="1" value="2" />
  </div>

  <div class="status">
    <span class="pill" id="parsedPill">parsed: 0</span>
    <span class="pill" id="donePill">done: 0</span>
    <span class="pill" id="failPill">fail: 0</span>
    <span class="pill" id="livePill">idle</span>
  </div>

  <div class="small">
    Not: Title’ı Vimeo oEmbed’den alır. (Cross-origin title okuma yok.)
  </div>
</header>

<main>
  <div class="pane">
    <div class="row">
      <strong>Input</strong>
      <span class="small">Sol tarafa blokları yapıştır</span>
    </div>
    <textarea id="input" placeholder="===== 1/18 =====
GÜN: Sprint 1 Gün 1
VİDEO: Canlı
LİNK: https://player.vimeo.com/video/1066714523"></textarea>
  </div>

  <div class="pane">
    <div class="row">
      <strong>Output</strong>
      <span class="small">Format: &quot;TITLE&quot; olan isim &quot;GÜN: VİDEO&quot;</span>
    </div>
    <textarea id="output" placeholder="Buraya sonuçlar gelecek..."></textarea>
  </div>
</main>

<script>
(() => {
  'use strict';

  const el = (id) => document.getElementById(id);

  const inputEl = el('input');
  const outputEl = el('output');

  const parsedPill = el('parsedPill');
  const donePill   = el('donePill');
  const failPill   = el('failPill');
  const livePill   = el('livePill');

  const btnParse = el('btnParse');
  const btnStart = el('btnStart');
  const btnStop  = el('btnStop');
  const btnCopy  = el('btnCopy');
  const btnClear = el('btnClear');

  const delayMsEl = el('delayMs');
  const retriesEl = el('retries');

  let items = [];
  let isRunning = false;
  let stopRequested = false;
  let doneCount = 0;
  let failCount = 0;

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  function setLive(text, kind) {
    livePill.textContent = text;
    livePill.classList.remove('ok','bad');
    if (kind === 'ok') livePill.classList.add('ok');
    if (kind === 'bad') livePill.classList.add('bad');
  }

  function updatePills() {
    parsedPill.textContent = `parsed: ${items.length}`;
    donePill.textContent   = `done: ${doneCount}`;
    failPill.textContent   = `fail: ${failCount}`;
  }

  function parseInput(raw) {
    // Blokları "=====" ile ayırmayı dene; olmazsa satır satır regex ile yakala.
    const blocks = raw
      .split(/={3,}.*?={3,}/g) // "===== 1/18 =====" gibi başlıkları ayırır
      .map(s => s.trim())
      .filter(Boolean);

    const parsed = [];

    for (const b of blocks) {
      const gun  = (b.match(/GÜN:\s*(.+)/i)  || [])[1]?.trim() || null;
      const video= (b.match(/VİDEO:\s*(.+)/i)|| [])[1]?.trim() || null;
      const link = (b.match(/LİNK:\s*(https?:\/\/\S+)/i)|| [])[1]?.trim() || null;

      if (!link) continue;

      parsed.push({
        gun: gun || 'Bilinmeyen Gün',
        video: video || 'Bilinmeyen Video',
        link
      });
    }

    // Eğer split işe yaramadıysa (tek parça geldiyse), global regex fallback:
    if (parsed.length === 0) {
      const re = /GÜN:\s*(.+)\nVİDEO:\s*(.+)\nLİNK:\s*(https?:\/\/\S+)/gi;
      let m;
      while ((m = re.exec(raw)) !== null) {
        parsed.push({ gun: m[1].trim(), video: m[2].trim(), link: m[3].trim() });
      }
    }

    // sıra korunsun
    return parsed;
  }

  async function fetchVimeoTitleOembed(url) {
    // Vimeo oEmbed: https://vimeo.com/api/oembed.json?url={video_url}
    // player.vimeo.com da olur genelde; yine de url paramına aynı linki veriyoruz.
    const oembed = `https://vimeo.com/api/oembed.json?url=${encodeURIComponent(url)}`;
    const res = await fetch(oembed, { method: 'GET' });
    if (!res.ok) throw new Error(`oEmbed HTTP ${res.status}`);
    const data = await res.json();
    // data.title ör: "01-02-p2: Beta"
    // bazen "on Vimeo" ekli olabilir; oEmbed genelde temiz title döndürür.
    return (data && data.title) ? String(data.title).trim() : null;
  }

  async function getTitleWithRetry(url, retries) {
    let lastErr = null;
    for (let i = 0; i <= retries; i++) {
      try {
        const t = await fetchVimeoTitleOembed(url);
        if (!t) throw new Error('Empty title');
        return t;
      } catch (e) {
        lastErr = e;
        await sleep(200 + i * 250);
      }
    }
    throw lastErr || new Error('Unknown error');
  }

  function appendOutput(line) {
    outputEl.value += (outputEl.value ? "\n" : "") + line;
  }

  btnParse.addEventListener('click', () => {
    items = parseInput(inputEl.value);
    doneCount = 0;
    failCount = 0;
    updatePills();
    setLive(items.length ? 'parsed' : 'nothing parsed', items.length ? 'ok' : 'bad');
  });

  btnClear.addEventListener('click', () => {
    outputEl.value = '';
  });

  btnCopy.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(outputEl.value);
      setLive('copied', 'ok');
    } catch {
      // fallback
      outputEl.focus();
      outputEl.select();
      document.execCommand('copy');
      setLive('copied (fallback)', 'ok');
    }
  });

  btnStop.addEventListener('click', () => {
    stopRequested = true;
    setLive('stopping...', 'bad');
  });

  btnStart.addEventListener('click', async () => {
    if (isRunning) return;
    if (!items.length) items = parseInput(inputEl.value);
    if (!items.length) {
      setLive('no items', 'bad');
      updatePills();
      return;
    }

    isRunning = true;
    stopRequested = false;
    btnStart.disabled = true;
    btnStop.disabled = false;

    doneCount = 0;
    failCount = 0;
    updatePills();
    setLive('running', 'ok');

    const delayMs = Math.max(0, Number(delayMsEl.value || 0));
    const retries = Math.max(0, Number(retriesEl.value || 0));

    for (let idx = 0; idx < items.length; idx++) {
      if (stopRequested) break;

      const it = items[idx];
      setLive(`fetching ${idx+1}/${items.length}`, 'ok');

      try {
        const title = await getTitleWithRetry(it.link, retries);
        const line = `"${title}" olan isim "${it.gun}: ${it.video}"`;
        appendOutput(line);
        doneCount++;
      } catch (e) {
        const err = (e && e.message) ? e.message : String(e);
        const line = `"TITLE_ALINAMADI" olan isim "${it.gun}: ${it.video}" | link=${it.link} | hata=${err}`;
        appendOutput(line);
        failCount++;
        setLive(`fail ${idx+1}/${items.length}`, 'bad');
      }

      updatePills();
      if (delayMs) await sleep(delayMs);
    }

    isRunning = false;
    btnStart.disabled = false;
    btnStop.disabled = true;

    if (stopRequested) {
      setLive('stopped', 'bad');
    } else {
      setLive('done', failCount ? 'bad' : 'ok');
    }
  });

  // İlk açılış: parse dene (boşsa sorun değil)
  updatePills();
  setLive('idle', 'ok');
})();
</script>
</body>
</html>
